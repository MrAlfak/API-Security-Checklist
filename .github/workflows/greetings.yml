name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          👋 Thanks for opening your first issue! We appreciate your contribution to making API security better for everyone.
          
          Please make sure you've provided all the necessary information and followed our guidelines.
          
          A maintainer will review your issue soon. In the meantime, feel free to explore our [documentation](../README.md) and [examples](../EXAMPLES.md).
        pr-message: |
          🎉 Thanks for opening your first pull request! We're excited to review your contribution.
          
          Please make sure:
          - [ ] Your changes follow our style guidelines
          - [ ] You've added both English and Persian translations (if applicable)
          - [ ] You've included references for security recommendations
          - [ ] All checks are passing
          
          A maintainer will review your PR soon. Thank you for helping improve API security! 🛡️
